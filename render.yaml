services:
  - type: web
    name: classroom-handwriting-board
    env: python
    plan: free
    buildCommand: python --version
    startCommand: python server.py
    envVars:
      - key: CLASSROOM_DATA_DIR
        value: /var/data
    disk:
      name: classroom-handwriting-data
      mountPath: /var/data
      sizeGB: 1
